  <style>
    :root {
      --bg: #06130f;
      --panel: #0b1d18;
      --card: #102a23;
      --line: rgba(255,255,255,.09);
      --text: #f8fafc;
      --muted: #71717a;
      --gold: #d4af37;
      --green: #22c55e;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Cairo, system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── LOGIN SCREEN ── */
    .login-screen {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
      background: radial-gradient(circle at 50% 20%, rgba(212,175,55,.1), transparent 50%);
    }
    .login-card {
      width: min(440px, 100%);
      border: 1px solid rgba(212,175,55,.28);
      border-radius: 14px;
      background: var(--panel);
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,.5);
    }
    .login-bar { height: 5px; background: linear-gradient(90deg,#d4af37,#0f8a5f,#d4af37); }
    .login-body { padding: 36px 32px; text-align: center; }
    .login-logo { font-size: 1.5rem; font-weight: 900; color: var(--text); margin-bottom: 6px; }
    .login-logo span { color: var(--gold); }
    .login-sub { color: var(--muted); font-size: .9rem; margin-bottom: 32px; }
    .google-btn {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: 14px 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.06); color: var(--text); font-weight: 800; font-size: .95rem;
      cursor: pointer; text-decoration: none; transition: background .15s, border-color .15s;
    }
    .google-btn:hover { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.3); }
    .google-icon { width: 20px; height: 20px; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--muted); font-size: .82rem; }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--line); }
    .order-form { text-align: left; }
    .order-form label { display: block; font-size: .82rem; font-weight: 700; color: #d4d4d8; margin-bottom: 6px; }
    .order-form input {
      width: 100%; padding: 11px 14px; border: 1px solid var(--line); border-radius: 8px;
      background: rgba(0,0,0,.35); color: var(--text); font: inherit; margin-bottom: 12px;
    }
    .order-form input:focus { outline: none; border-color: rgba(212,175,55,.5); }
    .order-access-btn {
      width: 100%; padding: 13px; border: 0; border-radius: 8px;
      background: linear-gradient(180deg,#f6e7b0,var(--gold) 54%,#b8860b); color: #111;
      font-weight: 900; font-size: .95rem; cursor: pointer;
    }
    .error-msg { margin-top: 12px; padding: 10px 14px; border-radius: 8px; background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3); color: #fca5a5; font-size: .85rem; text-align: center; display: none; }
    .error-msg.visible { display: block; }

    /* ── PORTAL SCREEN ── */
    .portal-screen { display: none; }
    .portal-screen.active { display: block; }

    /* Header */
    .portal-header {
      position: sticky; top: 0; z-index: 20;
      background: rgba(10,10,10,.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      padding: 0 24px;
    }
    .portal-header-inner {
      max-width: 1400px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px; gap: 16px;
    }
    .portal-brand { font-weight: 900; font-size: 1.05rem; }
    .portal-brand span { color: var(--gold); }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .user-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      border: 2px solid rgba(212,175,55,.4); object-fit: cover;
      background: rgba(212,175,55,.15); display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: .85rem; color: var(--gold); overflow: hidden;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-name { font-weight: 700; font-size: .9rem; color: #d4d4d8; }
    .logout-btn {
      padding: 7px 14px; border: 1px solid var(--line); border-radius: 6px;
      background: transparent; color: var(--muted); font: inherit; font-size: .82rem;
      font-weight: 700; cursor: pointer; text-decoration: none;
    }
    .logout-btn:hover { border-color: rgba(239,68,68,.4); color: #fca5a5; }

    /* Main content */
    .portal-main { max-width: 1400px; margin: 0 auto; padding: 28px 24px 60px; }

    /* Stats bar */
    .portal-stats {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px; margin-bottom: 22px;
    }
    .portal-title { font-size: 1.4rem; font-weight: 900; }
    .products-count { color: var(--muted); font-size: .9rem; }
    .products-count strong { color: var(--text); font-weight: 800; }

    /* Category filters */
    .filters {
      display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px;
    }
    .filter-btn {
      padding: 7px 16px; border-radius: 999px; border: 1px solid var(--line);
      background: transparent; color: var(--muted); font: inherit; font-size: .85rem;
      font-weight: 700; cursor: pointer; transition: all .15s;
    }
    .filter-btn:hover { border-color: rgba(255,255,255,.3); color: var(--text); }
    .filter-btn.active { background: var(--green); border-color: var(--green); color: #fff; font-weight: 900; }

    /* Search */
    .search-bar {
      width: 100%; margin-bottom: 20px;
    }
    .search-bar input {
      width: min(360px, 100%); padding: 10px 16px; border: 1px solid var(--line);
      border-radius: 8px; background: rgba(255,255,255,.04); color: var(--text);
      font: inherit; font-size: .9rem;
    }
    .search-bar input:focus { outline: none; border-color: rgba(212,175,55,.4); }

    /* Product grid */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 14px;
    }
    .product-card {
      border-radius: var(--radius); overflow: hidden; background: var(--card);
      border: 1px solid var(--line); cursor: pointer;
      transition: transform .2s, border-color .2s, box-shadow .2s;
      text-decoration: none; color: inherit;
    }
    .product-card:hover {
      transform: translateY(-4px); border-color: rgba(255,255,255,.22);
      box-shadow: 0 12px 40px rgba(0,0,0,.4);
    }
    .product-img {
      width: 100%; aspect-ratio: 4/3; overflow: hidden; position: relative;
      background: #222;
    }
    .product-img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .3s; }
    .product-card:hover .product-img img { transform: scale(1.04); }
    .product-img-placeholder {
      width: 100%; height: 100%; display: grid; place-items: center;
      font-size: 2.5rem; color: rgba(255,255,255,.15);
    }
    .cat-badge {
      position: absolute; top: 8px; left: 8px;
      padding: 3px 10px; border-radius: 999px; font-size: .72rem; font-weight: 900;
      text-transform: uppercase; letter-spacing: .5px; background: #22c55e; color: #fff;
    }
    .product-info { padding: 12px 14px 14px; }
    .product-name { font-weight: 800; font-size: .88rem; line-height: 1.35; color: var(--text); }

    /* Download modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,.75); place-items: center; padding: 20px;
    }
    .modal-overlay.active { display: grid; }
    .modal {
      width: min(500px,100%); background: var(--panel); border-radius: 14px;
      border: 1px solid rgba(212,175,55,.28); overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,.5);
    }
    .modal-bar { height: 4px; background: linear-gradient(90deg,#d4af37,#0f8a5f,#d4af37); }
    .modal-body { padding: 28px 28px 24px; }
    .modal-img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; margin-bottom: 16px; display: none; }
    .modal-img.visible { display: block; }
    .modal-cat { font-size: .75rem; font-weight: 800; color: var(--green); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .modal-name { font-size: 1.25rem; font-weight: 900; margin-bottom: 8px; }
    .modal-desc { color: var(--muted); font-size: .9rem; margin-bottom: 22px; }
    .modal-actions { display: flex; gap: 10px; }
    .download-btn {
      flex: 1; padding: 13px; border: 0; border-radius: 8px;
      background: linear-gradient(180deg,#f6e7b0,var(--gold) 54%,#b8860b);
      color: #111; font-weight: 900; font-size: .95rem; cursor: pointer; text-decoration: none;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .modal-close {
      padding: 13px 16px; border: 1px solid var(--line); border-radius: 8px;
      background: transparent; color: var(--muted); font-weight: 700; cursor: pointer; font: inherit;
    }

    /* Empty / loading states */
    .empty-state { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--muted); }
    .skeleton { animation: pulse 1.5s infinite; background: rgba(255,255,255,.06); border-radius: var(--radius); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

    @media (max-width: 1200px) { .products-grid { grid-template-columns: repeat(4,minmax(0,1fr)); } }
    @media (max-width: 900px)  { .products-grid { grid-template-columns: repeat(3,minmax(0,1fr)); } }
    @media (max-width: 600px)  { .products-grid { grid-template-columns: repeat(2,minmax(0,1fr)); } .portal-main { padding: 16px; } }
  </style>
</head>

      try {
        const res = await fetch("/auth/me", { credentials: "include" });

        if (data.authenticated) {
          await loadPortal();

      } catch (_) {}

    // ── Order-based access ──
    document.getElementById("order-access-btn").addEventListener("click", async () => {

      if (!email || !orderId) {
        showError(t.missingFields);
        return;
      }

      const btn = document.getElementById("order-access-btn");
      btn.textContent = t.verifying;
      btn.disabled = true;

      try {
        const res = await fetch("/api/portal-products", {
          headers: { "x-order-email": email, "x-order-id": orderId }
        });
        const data = await res.json();

        if (!res.ok || !data.isPurchaser) {
          showError(data.code === "NO_PURCHASE"
            ? t.noPurchase
            : t.denied);
        } else {
          renderPortal(data);
        }
      } catch (_) {
        showError(t.network);
      } finally {
        btn.textContent = t.accessBtn;
        btn.disabled = false;
      }
    });

    async function loadPortal() {
      try {
        const res = await fetch("/api/portal-products", { credentials: "include" });
        const data = await res.json();
        if (res.ok && data.isPurchaser) {
          renderPortal(data);
        }
      } catch (_) {}
    }

    function renderPortal(data) {
      allProducts = data.products || [];
      const user = data.user || {};

      // User info
      const avatarEl = document.getElementById("user-avatar");
      if (user.picture) {
        avatarEl.innerHTML = `<img src="${user.picture}" alt="">`;
      } else {
        avatarEl.textContent = (user.name || user.email || "?")[0].toUpperCase();
      }
      document.getElementById("user-name").textContent = user.name || user.email || "";

      // Show portal
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("portal-screen").classList.add("active");

      buildFilters();
      renderProducts();
    }

    function buildFilters() {
      const cats = [...new Set(allProducts.map((p) => p.category).filter(Boolean))].sort((a, b) => a.localeCompare(b));

      const filtersEl = document.getElementById("filters");
      filtersEl.innerHTML = [
        `<button class="filter-btn${activeCategory === "all" ? " active" : ""}" data-cat="all" type="button">${t.all}</button>`,
        ...cats.map((cat) =>
          `<button class="filter-btn${cat === activeCategory ? " active" : ""}" data-cat="${escAttr(cat)}" type="button">${escHtml(cat)}</button>`
        )
      ].join("");

      filtersEl.querySelectorAll(".filter-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          activeCategory = btn.dataset.cat;
          filtersEl.querySelectorAll(".filter-btn").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          renderProducts();
        });
      });
    }

    function renderProducts() {
      const query = document.getElementById("search-input").value.toLowerCase();
      const filtered = allProducts.filter((p) => {
        const matchCat = activeCategory === "all" || p.category === activeCategory;
        const matchSearch = !query || p.name.toLowerCase().includes(query) || (p.category || "").toLowerCase().includes(query);
        return matchCat && matchSearch;
      });

      document.getElementById("count-display").textContent = filtered.length;

      const grid = document.getElementById("products-grid");
      if (!filtered.length) {
        grid.innerHTML = `<div class="empty-state"><p>${t.emptyCategory}</p></div>`;
        return;
      }

      grid.innerHTML = filtered.map((p) => {
        const color = CATEGORY_COLORS[p.category] || "#71717a";
        const img = p.imageUrl
          ? `<img src="${p.imageUrl}" alt="${p.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=product-img-placeholder>📦</div>'">`
          : `<div class="product-img-placeholder">📦</div>`;
        return `<div class="product-card" data-id="${p.id}">
          <div class="product-img">
            ${img}
            <span class="cat-badge" style="background:${color}">${escHtml(p.category || "Otros")}</span>
          </div>
          <div class="product-info">
            <div class="product-name">${escHtml(p.name)}</div>
          </div>
        </div>`;
      }).join("");

      grid.querySelectorAll(".product-card").forEach((card) => {
        card.addEventListener("click", () => {
          const product = filtered.find((p) => p.id === card.dataset.id);
          if (product) openModal(product);
        });
      });
    }

    function openModal(product) {
      const color = CATEGORY_COLORS[product.category] || "#71717a";
      const img = document.getElementById("modal-img");
      if (product.imageUrl) {
        img.src = product.imageUrl;
        img.classList.add("visible");
      } else {
        img.classList.remove("visible");
      }
      document.getElementById("modal-cat").textContent = product.category || "";
      document.getElementById("modal-cat").style.color = color;
      document.getElementById("modal-name").textContent = product.name;
      document.getElementById("modal-desc").textContent = product.description || "";
      document.getElementById("modal-download").href = product.downloadUrl;
      document.getElementById("modal-overlay").classList.add("active");
    }

    document.getElementById("modal-close").addEventListener("click", () => {
      document.getElementById("modal-overlay").classList.remove("active");
    });
    document.getElementById("modal-overlay").addEventListener("click", (e) => {
      if (e.target === document.getElementById("modal-overlay"))
        document.getElementById("modal-overlay").classList.remove("active");
    });

    document.getElementById("search-input").addEventListener("input", renderProducts);

    function detectLang() {
      const fromUrl = cleanLang(urlParams.get("lang"));
      if (fromUrl) {
        localStorage.setItem("site_lang", fromUrl);
        return fromUrl;
      }
      const stored = cleanLang(localStorage.getItem("site_lang"));
      if (stored) return stored;
      const br = (navigator.language || "en").toLowerCase();
      if (br.startsWith("ar")) return "ar";
      if (br.startsWith("pt")) return "pt";
      if (br.startsWith("es")) return "es";
      return "ar";
    }

    function cleanLang(value) {
      return ["en", "es", "pt", "ar"].includes(value) ? value : "";
    }

    function applyLanguage() {
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
      document.title = `${t.title} — Digital Products Pack`;
      document.getElementById("login-sub").textContent = t.loginSub;
      document.getElementById("google-btn-text").textContent = t.googleBtn;
      document.getElementById("google-btn").href = `/auth/google?lang=${encodeURIComponent(lang)}&return=${encodeURIComponent("/portal.html")}`;
      document.getElementById("divider-text").textContent = t.divider;
      document.getElementById("email-label").textContent = t.emailLabel;
      document.getElementById("order-label").textContent = t.orderLabel;
      document.getElementById("order-access-btn").textContent = t.accessBtn;
      document.getElementById("brand-products").textContent = t.brandProducts;
      document.getElementById("logout-link").textContent = t.logout;
      document.getElementById("portal-title").textContent = t.portalTitle;
      document.getElementById("count-prefix").textContent = t.countPrefix;
      document.getElementById("count-suffix").textContent = t.countSuffix;
      document.getElementById("search-input").placeholder = t.search;
      document.getElementById("download-text").textContent = "⬇ " + t.download;
      document.getElementById("modal-close").textContent = t.close;
    }

    function escHtml(str) {
      return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    function escAttr(str) {
      return escHtml(str).replace(/'/g,"&#39;");
    }

    function showError(msg) {
      const el = document.getElementById("error-msg");
      el.textContent = msg;
      el.classList.add("visible");
    }

    init();
  </script>
</body>
</html>
